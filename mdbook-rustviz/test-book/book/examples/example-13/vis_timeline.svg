        <g data-hash="5" class="tooltip-trigger" data-tooltip-text="&lt;span style=&quot;font-family: 'Source Code Pro',
        Consolas, 'Ubuntu Mono', Menlo, 'DejaVu Sans Mono',
        monospace, monospace !important;&quot;&gt;r&lt;/span&gt; goes out of scope. Its resource is dropped.">
            <circle cx="70" cy="835" r="5"/>
            <polygon points="67,834 73,834 70,838" style="fill: white; stroke: none; pointer-events: none;"/>
        </g>
        <use xlink:href="#functionDot" data-hash="5" x="70" y="805" class="tooltip-trigger" data-tooltip-text="&lt;span style=&quot;font-family: 'Source Code Pro', Consolas, 'Ubuntu Mono', Menlo, 'DejaVu Sans Mono', monospace, monospace !important;&quot;&gt;print_area&lt;/span&gt; reads from &lt;span style=&quot;font-family: 'Source Code Pro', Consolas, 'Ubuntu Mono', Menlo, 'DejaVu Sans Mono', monospace, monospace !important;&quot;&gt;r&lt;/span&gt;"/>
    </g>

