name: pages

# Builds the Vite SPA in `pages` mode and pushes the resulting dist/
# tree to the `rustviz/rustviz.github.io` repo — GitHub's special
# user/org-page repo name. Anything pushed to that repo's default
# branch is served at https://rustviz.github.io/ (org root, no path
# prefix).
#
# Setup the repo owner needs to do once before this workflow can run:
#   1. Create the receiving repo (named exactly <org>.github.io for
#      GitHub to serve it as the org page at the root URL):
#        gh repo create rustviz/rustviz.github.io --public \
#          --description "Static front-end for the RustViz playground"
#   2. On rustviz/rustviz.github.io, enable GitHub Pages:
#        Settings → Pages → Source: Deploy from a branch → main / root.
#   3. Generate a deploy keypair:
#        ssh-keygen -t ed25519 -f /tmp/playground_deploy_key -N "" \
#          -C "playground-deploy"
#   4. Add the *public* key to rustviz/rustviz.github.io:
#        Settings → Deploy keys → Add key, paste /tmp/playground_deploy_key.pub,
#        check "Allow write access".
#   5. Add the *private* key to rustviz/rustviz:
#        gh secret set PAGES_DEPLOY_KEY \
#          --repo rustviz/rustviz < /tmp/playground_deploy_key
#   6. Delete the local keypair: rm /tmp/playground_deploy_key*
#
# After that, every push to main here triggers a Pages deploy.

on:
  push:
    branches: [main]
    paths:
      # Only rebuild when the frontend or its config actually changes.
      - 'playground/frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Bumped from 10 min: a cold cargo cache rebuilds the rustviz
    # plugin from scratch (~3-4 min on GitHub's runners) before the
    # prerender step can run. Subsequent runs hit the rust-cache and
    # finish well under the original budget.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: playground/frontend/package-lock.json

      # The frontend's `prebuild` step runs `scripts/prerender.ts`,
      # which shells out to the `rustviz` CLI for every curated
      # dropdown example so the SPA can ship pre-rendered SVGs and
      # skip the cold-start ~45 s API round-trip on first paint.
      # That requires the plugin's pinned nightly toolchain + a
      # built rustviz-cli on PATH.
      - name: Install pinned Rust toolchain
        # rust-toolchain.toml at the workspace root pins the nightly
        # the plugin links against. `rustup show` materialises it.
        run: rustup show

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Scope the cache key to the plugin's manifest so frontend-
          # only changes still get cache hits.
          shared-key: pages-prerender

      - name: Install rustviz plugin + CLI
        # `--locked` is critical — Cargo.lock pins transitive deps
        # past their crates.io defaults; fresh resolution would fail
        # against the pinned nightly. `cargo xtask setup` does the same.
        run: |
          cargo install --path rustviz-plugin --locked
          cargo install --path rustviz-cli --locked

      - name: Install frontend deps
        run: npm ci
        working-directory: playground/frontend

      - name: Build SPA in pages mode
        # `npm run build:pages` fires the prebuild hook which runs
        # the prerender script (`tsx scripts/prerender.ts`); a
        # failed render aborts the build by design.
        run: npm run build:pages
        working-directory: playground/frontend

      - name: Deploy to rustviz/rustviz.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: rustviz/rustviz.github.io
          publish_branch: main
          publish_dir: playground/frontend/dist
          # Helpful when diagnosing a botched deploy: each commit on the
          # destination branch references the source SHA it was built from.
          commit_message: 'deploy: ${{ github.sha }}'
